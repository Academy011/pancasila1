            },
            {
                q: "Pancasila di kenal sebagai ideology terbuka yang mampu menyesuaikan diri dengan perkembangan zaman. Pancasila relevan dalam menghadapi berbagai tantangan dan perubahan global karena . . .",
                opts: ["Pancasila menerima pengaruh budaya asing yang sesuai dengan nilai-nilai nasionalisme", "Pancasila memungkinkan penyesuaian nilai-nilai sesuai dengan perkembangan zaman", "Pancasila dapat diubah sesuai keinginan pemerintah yang berkuasa", "Pancasila mendorong partisipsi aktif warga Negara dalam pemerintah", "Pancasila menekankan persatuan dan kesatuan bangsa diatas segala perbedaan."],
                ans: 1 
            }
        ];

        let currentQuestion = 0;
        const userAnswers = new Array(questions.length).fill(null);
        let timeLeft = 2700; // 45 Menit untuk 27 Soal (dalam detik)
        let timerInterval;

        const qNumEl = document.getElementById('q-num');
        const qTextEl = document.getElementById('q-text');
        const optionsEl = document.getElementById('options-container');
        const gridEl = document.getElementById('number-grid');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const btnSubmit = document.getElementById('btn-submit');

        function initTest() {
            questions.forEach((_, index) => {
                const btn = document.createElement('button');
                btn.className = 'num-btn';
                btn.innerText = index + 1;
                btn.onclick = () => jumpToQuestion(index);
                gridEl.appendChild(btn);
            });
            loadQuestion(0);
            startTimer();
        }

        function loadQuestion(index) {
            currentQuestion = index;
            const q = questions[index];
            qNumEl.innerText = index + 1;
            qTextEl.innerHTML = q.q.replace(/\n/g, '<br>');
            
            optionsEl.innerHTML = '';
            const labels = ['A', 'B', 'C', 'D', 'E'];
            
            q.opts.forEach((opt, optIdx) => {
                const label = document.createElement('label');
                label.className = 'option-label';
                
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'answer';
                radio.value = optIdx;
                if(userAnswers[index] === optIdx) radio.checked = true;
                
                radio.onchange = () => {
                    userAnswers[index] = optIdx;
                    updateGrid();
                };

                label.appendChild(radio);
                label.appendChild(document.createTextNode(` ${labels[optIdx]}. ${opt}`));
                optionsEl.appendChild(label);
            });

            btnPrev.style.visibility = index === 0 ? 'hidden' : 'visible';
            if (index === questions.length - 1) {
                btnNext.style.display = 'none';
                btnSubmit.style.display = 'block';
            } else {
                btnNext.style.display = 'block';
                btnSubmit.style.display = 'none';
            }
            updateGrid();
        }

        function updateGrid() {
            const buttons = gridEl.children;
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].className = 'num-btn';
                if (userAnswers[i] !== null) buttons[i].classList.add('answered');
                if (i === currentQuestion) buttons[i].classList.add('active');
            }
        }

        function prevQuestion() { if(currentQuestion > 0) loadQuestion(currentQuestion - 1); }
        function nextQuestion() { if(currentQuestion < questions.length - 1) loadQuestion(currentQuestion + 1); }
        function jumpToQuestion(idx) { loadQuestion(idx); }

        function startTimer() {
            const timerEl = document.getElementById('timer');
            timerInterval = setInterval(() => {
                timeLeft--;
                const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
                const s = (timeLeft % 60).toString().padStart(2, '0');
                timerEl.innerText = `${m}:${s}`;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    finishTest();
                }
            }, 1000);
        }

        function finishTest() {
            clearInterval(timerInterval);
            let score = 0;
            let correct = 0;
            
            userAnswers.forEach((ans, idx) => {
                if (ans === questions[idx].ans) {
                    correct++;
                    score += 5; 
                }
            });

            document.getElementById('test-container').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';
            
            document.getElementById('final-score').innerText = score;
            document.getElementById('correct-count').innerText = correct;
            document.getElementById('wrong-count').innerText = questions.length - correct;
        }

        window.onload = initTest;
    </script>
</body>
</html>
